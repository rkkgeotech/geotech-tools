<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Box Label Wizard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root{--panel-bg:#1a1f2e;--panel-surface:#242938;--panel-border:#343a52;--accent:#4ade80;--text-primary:#e8eaf0;--text-secondary:#8b90a8;--input-bg:#2d3347;--input-border:#404660;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--panel-bg);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;}

  /* ── SIDEBAR ── */
  #sidebar{width:270px;min-width:270px;background:var(--panel-surface);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;overflow-y:auto;}
  #sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--panel-border);}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);}
  .logo h1{font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);}
  #sidebar-header p{font-size:11px;color:var(--text-secondary);font-family:'IBM Plex Mono',monospace;}
  .form-section{padding:14px 18px;border-bottom:1px solid var(--panel-border);}
  .form-section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px;}
  .field{margin-bottom:10px;}.field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
  .field input[type=text]{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;color:var(--text-primary);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,222,128,.1);}
  #sidebar-footer{padding:14px 18px;margin-top:auto;}
  #btn-print{width:100%;padding:9px;background:var(--accent);color:#0d1117;border:none;border-radius:5px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;cursor:pointer;transition:background .15s,transform .1s;}
  #btn-print:hover{background:#86efac;transform:translateY(-1px);}
  .print-note{font-size:10px;color:var(--text-secondary);text-align:center;margin-top:6px;font-family:'IBM Plex Mono',monospace;}
  .print-warn{color:#f87171;}

  /* ── PREVIEW ── */
  #preview-pane{flex:1;overflow:auto;background:#2a2a35;padding:28px;display:flex;flex-direction:column;align-items:center;}
  #preview-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:18px;font-family:'IBM Plex Mono',monospace;}

  /* ── LABEL PAGE: landscape 11" x 8.5" ── */
  /* Avery 5168: 5.005"W x 3.51"H, top/left 0.49", v-gap 0.49", h-gap 0" */
  #label-page{
    background:white;
    width:11in;
    height:8.5in;
    padding:0.49in 0 0 0.49in;
    display:grid;
    grid-template-columns:repeat(2, 5.005in);
    grid-template-rows:repeat(2, 3.51in);
    column-gap:0;
    row-gap:0.49in;
    box-shadow:0 4px 40px rgba(0,0,0,.5);
    flex-shrink:0;
  }

  /* ── INDIVIDUAL LABEL ── */
  .box-label{
    width:5.005in;
    height:3.51in;
    padding:0.2in 0.25in 0.18in 0.2in;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    background:white;
  }

  /* Header: logo left, project info right */
  .lbl-header{
    display:flex;
    flex-direction:row;
    align-items:center;
    gap:0.18in;
    margin-bottom:0.14in;
  }
  .lbl-logo-img{
    width:1.35in;
    height:auto;
    flex-shrink:0;
  }
  .lbl-project-info{
    display:flex;
    flex-direction:column;
    justify-content:center;
  }
  .lbl-proj-name{
    font-family:Arial,Helvetica,sans-serif;
    font-size:16pt;
    font-weight:bold;
    color:#000;
    line-height:1.6;
  }
  .lbl-proj-num{
    font-family:Arial,Helvetica,sans-serif;
    font-size:16pt;
    font-weight:normal;
    color:#000;
    line-height:1.6;
  }

  /* Separator */
  .lbl-sep{
    border:none;
    border-top:1pt solid #999;
    margin-bottom:0.1in;
  }

  /* All form rows */
  .lbl-form{
    display:flex;
    flex-direction:column;
    gap:0.09in;
    flex:1;
    justify-content:space-evenly;
  }

  /* A single form row: label text + underline fill */
  .form-row{
    display:flex;
    flex-direction:row;
    gap:0.12in;
    align-items:flex-end;
  }
  .form-item{
    display:flex;
    flex-direction:row;
    align-items:flex-end;
    flex:1;
    gap:0;
  }
  .form-item .fi-label{
    font-family:Arial,Helvetica,sans-serif;
    font-size:12pt;
    color:#000;
    white-space:nowrap;
    line-height:1.3;
    padding-right:3pt;
  }
  .form-item .fi-line{
    flex:1;
    border-bottom:1pt solid #000;
    height:1.3em;
  }
  /* Inspector row gets less flex weight than boring rows */
  .form-row.inspector .form-item:first-child{ flex:1.4; }
  .form-row.inspector .form-item:last-child{ flex:1; }
  .form-row.boring .form-item:first-child{ flex:1.4; }
  .form-row.boring .form-item:last-child{ flex:1; }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <div class="logo"><div class="logo-dot"></div><h1>Box Label Wizard</h1></div>
    <p>RK&amp;K Field Sampling</p>
  </div>
  <div class="form-section">
    <div class="form-section-label">Project Info</div>
    <div class="field"><label>Project Name</label><input type="text" id="projName" placeholder="e.g. Conway Road"></div>
    <div class="field"><label>Project Number</label><input type="text" id="projNum" placeholder="e.g. 23195 or 12345.678"></div>
  </div>
  <div id="sidebar-footer">
    <button id="btn-print">Print Labels</button>
    <div class="print-note">Avery 5168 · landscape · 4/sheet</div>
    <div class="print-note">Margins = None · Orientation = Landscape</div>
  </div>
</aside>

<main id="preview-pane">
  <div id="preview-title">Print Preview — Avery 5168</div>
  <div id="label-page"></div>
</main>

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function buildLabel(name, num){
  const n = esc(name || 'Project Name');
  const p = esc(num  || '_ _ _ _ _');
  return `
    <div class="box-label">
      <div class="lbl-header">
        <img class="lbl-logo-img" src="${LOGO_SRC}" alt="RK&K">
        <div class="lbl-project-info">
          <div class="lbl-proj-name">${n}</div>
          <div class="lbl-proj-num">Project&nbsp;#&nbsp;${p}</div>
        </div>
      </div>
      <hr class="lbl-sep">
      <div class="lbl-form">
        <div class="form-row inspector">
          <div class="form-item">
            <span class="fi-label">Inspector:</span><span class="fi-line"></span>
          </div>
          <div class="form-item">
            <span class="fi-label">Date:</span><span class="fi-line"></span>
          </div>
        </div>
        <div class="form-row boring">
          <div class="form-item"><span class="fi-label">Boring ID:</span><span class="fi-line"></span></div>
          <div class="form-item"><span class="fi-label">Sample IDs:</span><span class="fi-line"></span></div>
        </div>
        <div class="form-row boring">
          <div class="form-item"><span class="fi-label">Boring ID:</span><span class="fi-line"></span></div>
          <div class="form-item"><span class="fi-label">Sample IDs:</span><span class="fi-line"></span></div>
        </div>
        <div class="form-row boring">
          <div class="form-item"><span class="fi-label">Boring ID:</span><span class="fi-line"></span></div>
          <div class="form-item"><span class="fi-label">Sample IDs:</span><span class="fi-line"></span></div>
        </div>
        <div class="form-row boring">
          <div class="form-item"><span class="fi-label">Boring ID:</span><span class="fi-line"></span></div>
          <div class="form-item"><span class="fi-label">Sample IDs:</span><span class="fi-line"></span></div>
        </div>
      </div>
    </div>`;
}

function render(){
  const n = document.getElementById('projName').value.trim();
  const p = document.getElementById('projNum').value.trim();
  let h = '';
  for(let i=0;i<4;i++) h += buildLabel(n, p);
  document.getElementById('label-page').innerHTML = h;
}

document.getElementById('projName').addEventListener('input', render);
document.getElementById('projNum').addEventListener('input', render);
document.getElementById('btn-print').addEventListener('click', () => window.print());
render();
</script>

<style>
@media print{
  @page{size:11in 8.5in landscape;margin:0;}
  body{display:block!important;height:auto!important;overflow:visible!important;background:white!important;}
  #sidebar{display:none!important;}
  #preview-pane{display:block!important;padding:0!important;background:white!important;overflow:visible!important;}
  #preview-title{display:none!important;}
  #label-page{
    box-shadow:none!important;
    width:11in!important;
    height:8.5in!important;
    padding:0.49in 0 0 0.49in!important;
  }
  .box-label{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
</body>
