<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jar Label Wizard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
  :root{--panel-bg:#1a1f2e;--panel-surface:#242938;--panel-border:#343a52;--accent:#4ade80;--text-primary:#e8eaf0;--text-secondary:#8b90a8;--input-bg:#2d3347;--input-border:#404660;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'IBM Plex Sans',sans-serif;background:var(--panel-bg);color:var(--text-primary);display:flex;height:100vh;overflow:hidden;}

  /* ── SIDEBAR ── */
  #sidebar{width:270px;min-width:270px;background:var(--panel-surface);border-right:1px solid var(--panel-border);display:flex;flex-direction:column;overflow-y:auto;}
  #sidebar-header{padding:18px 18px 14px;border-bottom:1px solid var(--panel-border);}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
  .logo-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px var(--accent);}
  .logo h1{font-size:12px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);}
  #sidebar-header p{font-size:11px;color:var(--text-secondary);font-family:'IBM Plex Mono',monospace;}
  .form-section{padding:14px 18px;border-bottom:1px solid var(--panel-border);}
  .form-section-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:10px;}
  .field{margin-bottom:10px;}.field:last-child{margin-bottom:0;}
  .field label{display:block;font-size:11px;color:var(--text-secondary);margin-bottom:4px;font-family:'IBM Plex Mono',monospace;}
  .field input[type=text]{width:100%;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;color:var(--text-primary);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:6px 9px;outline:none;transition:border-color .15s;}
  .field input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(74,222,128,.1);}
  .radio-group{display:flex;flex-direction:column;gap:5px;}
  .radio-option{display:flex;align-items:center;gap:8px;padding:6px 9px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:4px;cursor:pointer;transition:border-color .15s,background .15s;}
  .radio-option:hover{border-color:#4ade80aa;}
  .radio-option input[type=radio]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0;}
  .radio-option.selected{border-color:var(--accent);background:rgba(74,222,128,.07);}
  .opt-label{font-size:11px;color:var(--text-primary);font-family:'IBM Plex Mono',monospace;line-height:1.3;}
  .opt-sub{font-size:10px;color:var(--text-secondary);display:block;}
  #sidebar-footer{padding:14px 18px;margin-top:auto;}
  #btn-print{width:100%;padding:9px;background:var(--accent);color:#0d1117;border:none;border-radius:5px;font-family:'IBM Plex Sans',sans-serif;font-weight:600;font-size:13px;letter-spacing:.04em;cursor:pointer;transition:background .15s,transform .1s;}
  #btn-print:hover{background:#86efac;transform:translateY(-1px);}
  #btn-print:active{transform:translateY(0);}
  .print-note{font-size:10px;color:var(--text-secondary);text-align:center;margin-top:6px;font-family:'IBM Plex Mono',monospace;}
  .print-warn{color:#f87171;}

  /* ── PREVIEW ── */
  #preview-pane{flex:1;overflow-y:auto;background:#2a2a35;padding:28px;display:flex;flex-direction:column;align-items:center;}
  #preview-title{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-secondary);margin-bottom:18px;font-family:'IBM Plex Mono',monospace;}

  /* ── LABEL PAGE ── */
  /* Exact Avery 94089 measurements extracted from PDF:          */
  /*   Circle dia: 1.98"  |  H-pitch: 2.09"  |  V-pitch: 2.09" */
  /*   Top margin: 0.305" |  Left margin: 0.115"                */
  #label-page{
    background:white;
    width:8.5in;
    min-height:11in;
    padding:0.305in 0 0 0.115in;
    display:grid;
    grid-template-columns:repeat(4, 2.09in);
    grid-template-rows:repeat(5, 2.09in);
    gap:0;
    box-shadow:0 4px 40px rgba(0,0,0,.5);
  }

  .label-cell{width:2.09in;height:2.09in;display:flex;align-items:center;justify-content:center;}

  .jar-label{
    width:1.98in;height:1.98in;
    background:white;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    text-align:center;
    padding:0.12in;
    overflow:hidden;
  }

  /* 12pt Arial, line-height 1.45 */
  .label-row{
    font-family:Arial,Helvetica,sans-serif;
    font-size:12pt;
    color:#000;
    line-height:1.45;
    white-space:nowrap;
    width:100%;
    text-align:center;
  }
  .white-part{color:#fff;}
  .black-part{color:#000;}

  /* ── PRINT ── */
  @media print{
    @page{size:8.5in 11in;margin:0;}
    body{display:block!important;height:auto!important;overflow:visible!important;background:white!important;}
    #sidebar{display:none!important;}
    #preview-pane{display:block!important;padding:0!important;background:white!important;overflow:visible!important;}
    #preview-title{display:none!important;}
    #label-page{
      box-shadow:none!important;
      width:8.5in!important;
      min-height:0!important;
      padding:0.305in 0 0 0.115in!important;
    }
    .jar-label{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  }
</style>
</head>
<body>

<aside id="sidebar">
  <div id="sidebar-header">
    <div class="logo"><div class="logo-dot"></div><h1>Jar Label Wizard</h1></div>
    <p>RK&amp;K Field Sampling</p>
  </div>
  <div class="form-section">
    <div class="form-section-label">Project Info</div>
    <div class="field"><label>Project Name</label><input type="text" id="projName" placeholder="e.g. Conway Rd"></div>
    <div class="field"><label>Project Number</label><input type="text" id="projNum" placeholder="e.g. 23195 or 12345.678"></div>
  </div>
  <div class="form-section">
    <div class="form-section-label">Sampling Interval</div>
    <div class="radio-group">
      <label class="radio-option selected"><input type="radio" name="interval" value="3" checked><span class="opt-label">3 x 6-inch<span class="opt-sub">XXX - XXX - XXX</span></span></label>
      <label class="radio-option"><input type="radio" name="interval" value="4"><span class="opt-label">4 x 6-inch<span class="opt-sub">XX - XX - XX - XX</span></span></label>
    </div>
  </div>
  <div class="form-section">
    <div class="form-section-label">Recovery Format</div>
    <div class="radio-group">
      <label class="radio-option selected"><input type="radio" name="recovery" value="std" checked><span class="opt-label">Standard<span class="opt-sub">R: XXX / XXX</span></span></label>
      <label class="radio-option"><input type="radio" name="recovery" value="pct"><span class="opt-label">Percentage<span class="opt-sub">R: XXX %</span></span></label>
    </div>
  </div>
  <div id="sidebar-footer">
    <button id="btn-print">Print Labels</button>
    <div class="print-note">Avery 94089 · 2" round · 20/sheet</div>
    <div class="print-note">Set margins to None in print dialog</div>
    <div class="print-note print-warn">Enable "Background graphics"</div>
  </div>
</aside>

<main id="preview-pane">
  <div id="preview-title">Print Preview — Avery 94089</div>
  <div id="label-page"></div>
</main>

<script>
const N=20;
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function intHTML(v){
  if(v==='3')return'<span class="white-part">XXX</span><span class="black-part"> - </span><span class="white-part">XXX</span><span class="black-part"> - </span><span class="white-part">XXX</span>';
  return'<span class="white-part">XX</span><span class="black-part"> - </span><span class="white-part">XX</span><span class="black-part"> - </span><span class="white-part">XX</span><span class="black-part"> - </span><span class="white-part">XX</span>';
}
function recHTML(v){
  if(v==='std')return'<span class="black-part">R: </span><span class="white-part">XXX</span><span class="black-part"> / </span><span class="white-part">XXX</span>';
  return'<span class="black-part">R: </span><span class="white-part">XXX</span><span class="black-part"> %</span>';
}
function buildLabel(n,p,iv,rv){
  return'<div class="label-cell"><div class="jar-label">'+
    '<div class="label-row">'+esc(n||'Project Name')+'</div>'+
    '<div class="label-row">Project # '+esc(p||'_ _ _ _ _')+'</div>'+
    '<div class="label-row"><span class="white-part">X-XXX-X-XX</span><span class="black-part">, S-</span><span class="white-part">XX</span></div>'+
    '<div class="label-row"><span class="white-part">XXX.X </span><span class="black-part">to </span><span class="white-part">XXX.X </span><span class="black-part">ft</span></div>'+
    '<div class="label-row">'+intHTML(iv)+'</div>'+
    '<div class="label-row">'+recHTML(rv)+'</div>'+
  '</div></div>';
}
function render(){
  const n=document.getElementById('projName').value.trim();
  const p=document.getElementById('projNum').value.trim();
  const iv=document.querySelector('input[name="interval"]:checked').value;
  const rv=document.querySelector('input[name="recovery"]:checked').value;
  let h='';for(let i=0;i<N;i++)h+=buildLabel(n,p,iv,rv);
  document.getElementById('label-page').innerHTML=h;
}
document.querySelectorAll('.radio-option').forEach(opt=>{
  opt.addEventListener('click',()=>{
    opt.closest('.radio-group').querySelectorAll('.radio-option').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');render();
  });
});
document.getElementById('projName').addEventListener('input',render);
document.getElementById('projNum').addEventListener('input',render);
document.getElementById('btn-print').addEventListener('click',()=>window.print());
render();
</script>
</body>
</html>
